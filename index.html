
<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>智能任务优先级可视化 | 滑动菜单版</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/lxgw/lxgw-wenkai-screen-webfont@1.1.0/style.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-primary: #FDF6E3;
            --bg-secondary: #F5E6D3;
            --bg-tertiary: #E8D5C4;
            --accent: #D4A574;
            --text-primary: #5D4E37;
            --text-secondary: #8B7D6B;
            --card-bg: #FFFEF9;
            --shadow: rgba(139, 115, 85, 0.15);
            --border: #E8D5C4;
            
            --bubble-urgent: linear-gradient(135deg, #FF9A8B 0%, #FF6A88 50%, #FF99AC 100%);
            --bubble-high: linear-gradient(135deg, #FFD89B 0%, #FF9A8B 50%, #FFD89B 100%);
            --bubble-medium: linear-gradient(135deg, #A8EDFE 0%, #FED6E3 50%, #A8EDFE 100%);
            --bubble-low: linear-gradient(135deg, #D4FC79 0%, #96E6A1 50%, #D4FC79 100%);
            
            --header-gradient: linear-gradient(135deg, #D4A574 0%, #B8956A 100%);
            --complete-color: #43e97b;
            --delete-color: #e94560;
        }

        [data-theme="dark"] {
            --bg-primary: #1a1a2e;
            --bg-secondary: #16213e;
            --bg-tertiary: #0f3460;
            --accent: #e94560;
            --text-primary: #eaeaea;
            --text-secondary: #a0a0a0;
            --card-bg: #1f2937;
            --shadow: rgba(0, 0, 0, 0.4);
            --border: #374151;
            
            --bubble-urgent: linear-gradient(135deg, #e94560 0%, #ff6b6b 50%, #e94560 100%);
            --bubble-high: linear-gradient(135deg, #f093fb 0%, #f5576c 50%, #f093fb 100%);
            --bubble-medium: linear-gradient(135deg, #4facfe 0%, #00f2fe 50%, #4facfe 100%);
            --bubble-low: linear-gradient(135deg, #43e97b 0%, #38f9d7 50%, #43e97b 100%);
            
            --header-gradient: linear-gradient(135deg, #e94560 0%, #ff6b6b 100%);
        }

        body {
            font-family: 'Smiley Sans', '得意黑', 'LXGW WenKai Screen', -apple-system, BlinkMacSystemFont, 'Microsoft YaHei', sans-serif;
            background: var(--bg-primary);
            min-height: 100vh;
            color: var(--text-primary);
            overflow-x: hidden;
            position: relative;
            line-height: 1.8;
            transition: all 0.5s ease;
        }

        .background-decorations {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
            overflow: hidden;
        }

        .bg-particle {
            position: absolute;
            border-radius: 50%;
            background: radial-gradient(circle, var(--accent) 0%, transparent 70%);
            opacity: 0.3;
            animation: particleFloat 20s infinite ease-in-out;
        }

        @keyframes particleFloat {
            0%, 100% { transform: translateY(0) translateX(0) scale(1); }
            25% { transform: translateY(-100px) translateX(50px) scale(1.1); }
            50% { transform: translateY(-50px) translateX(-30px) scale(0.9); }
            75% { transform: translateY(-150px) translateX(20px) scale(1.05); }
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 25px 20px;
            position: relative;
            z-index: 1;
        }

        .top-controls {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            flex-wrap: wrap;
            gap: 15px;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .logo-icon {
            font-size: 2rem;
            animation: logoBounce 2s infinite ease-in-out;
        }

        @keyframes logoBounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-5px); }
        }

        .logo-text {
            font-size: 1.3rem;
            font-weight: 600;
            background: var(--header-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .control-buttons {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .control-btn {
            padding: 10px 18px;
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 15px;
            cursor: pointer;
            font-size: 0.85rem;
            font-weight: 600;
            color: var(--text-primary);
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .control-btn:hover {
            background: var(--accent);
            color: white;
            border-color: var(--accent);
            transform: translateY(-2px);
        }

        .control-btn.active {
            background: var(--header-gradient);
            color: white;
            border-color: transparent;
        }

        .header {
            text-align: center;
            margin-bottom: 25px;
            padding: 25px;
            background: var(--card-bg);
            border-radius: 20px;
            box-shadow: 0 8px 30px var(--shadow);
            border: 1px solid var(--border);
        }

        .header h1 {
            font-size: 1.8rem;
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 8px;
            letter-spacing: 2px;
        }

        .header p {
            font-size: 0.9rem;
            color: var(--text-secondary);
        }

        .header-emoji {
            font-size: 1.5rem;
            margin-top: 12px;
            letter-spacing: 8px;
        }

        .ai-thinking-bar {
            background: var(--card-bg);
            border-radius: 18px;
            padding: 18px 25px;
            margin-bottom: 25px;
            box-shadow: 0 8px 30px var(--shadow);
            border: 1px solid var(--border);
            display: flex;
            align-items: center;
            gap: 15px;
            flex-wrap: wrap;
        }

        .ai-status {
            display: flex;
            align-items: center;
            gap: 10px;
            flex: 1;
            min-width: 200px;
        }

        .ai-status-icon {
            width: 40px;
            height: 40px;
            background: var(--header-gradient);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.3rem;
            animation: aiGlow 2s infinite ease-in-out;
        }

        @keyframes aiGlow {
            0%, 100% { box-shadow: 0 0 15px var(--accent); }
            50% { box-shadow: 0 0 25px var(--accent), 0 0 40px var(--accent); }
        }

        .ai-status-text {
            font-weight: 600;
            color: var(--text-primary);
            font-size: 0.9rem;
        }

        .ai-status-subtext {
            font-size: 0.75rem;
            color: var(--text-secondary);
        }

        .ai-thinking-dots {
            display: flex;
            gap: 4px;
        }

        .ai-thinking-dots span {
            width: 7px;
            height: 7px;
            background: var(--accent);
            border-radius: 50%;
            animation: thinkingDot 1.4s infinite ease-in-out;
        }

        .ai-thinking-dots span:nth-child(1) { animation-delay: -0.32s; }
        .ai-thinking-dots span:nth-child(2) { animation-delay: -0.16s; }

        @keyframes thinkingDot {
            0%, 80%, 100% { transform: scale(0.6); opacity: 0.5; }
            40% { transform: scale(1); opacity: 1; }
        }

        .ai-actions {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }

        .ai-action-btn {
            padding: 8px 15px;
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 12px;
            cursor: pointer;
            font-size: 0.8rem;
            font-weight: 600;
            color: var(--text-primary);
            transition: all 0.3s ease;
        }

        .ai-action-btn:hover {
            background: var(--accent);
            color: white;
            border-color: var(--accent);
        }

        .ai-action-btn.active {
            background: var(--header-gradient);
            color: white;
            border-color: transparent;
        }

        .timeline-indicator {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 12px;
            margin-bottom: 25px;
            padding: 15px 20px;
            background: var(--card-bg);
            border-radius: 18px;
            box-shadow: 0 8px 30px var(--shadow);
            border: 1px solid var(--border);
            flex-wrap: wrap;
        }

        .time-segment {
            text-align: center;
            padding: 8px 15px;
            border-radius: 12px;
            transition: all 0.3s ease;
            cursor: pointer;
            border: 2px solid transparent;
            min-width: 75px;
        }

        .time-segment:hover {
            transform: translateY(-3px);
            background: var(--bg-secondary);
        }

        .time-segment.active {
            background: var(--header-gradient);
            color: white;
            box-shadow: 0 6px 20px var(--shadow);
            border-color: var(--accent);
        }

        .time-segment .icon {
            font-size: 1.3rem;
            margin-bottom: 4px;
            display: block;
        }

        .time-segment .label {
            font-size: 0.75rem;
            color: var(--text-secondary);
            display: block;
            font-weight: 500;
        }

        .time-segment.active .label {
            color: white;
        }

        .stats-panel {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 12px;
            margin-bottom: 25px;
        }

        .stat-card {
            background: var(--card-bg);
            border-radius: 16px;
            padding: 18px 12px;
            text-align: center;
            box-shadow: 0 8px 30px var(--shadow);
            border: 1px solid var(--border);
            transition: all 0.3s ease;
        }

        .stat-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 12px 35px var(--shadow);
        }

        .stat-icon {
            font-size: 1.6rem;
            margin-bottom: 6px;
            display: block;
        }

        .stat-value {
            font-size: 1.6rem;
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 4px;
        }

        .stat-label {
            color: var(--text-secondary);
            font-size: 0.8rem;
        }

        .main-content {
            display: grid;
            grid-template-columns: 1fr 350px;
            gap: 20px;
            margin-bottom: 25px;
        }

        .bubble-visualization {
            background: var(--card-bg);
            border-radius: 20px;
            padding: 20px;
            box-shadow: 0 10px 40px var(--shadow);
            border: 1px solid var(--border);
            min-height: 450px;
        }

        .section-title {
            font-size: 1.1rem;
            color: var(--text-primary);
            margin-bottom: 18px;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 8px;
            padding-bottom: 10px;
            border-bottom: 2px solid var(--border);
            letter-spacing: 1px;
        }

        .bubble-container {
            width: 100%;
            height: 380px;
            position: relative;
            background: linear-gradient(180deg, rgba(253, 246, 227, 0.3) 0%, rgba(245, 230, 211, 0.2) 100%);
            border-radius: 16px;
            overflow: hidden;
        }

        .task-bubble {
            position: absolute;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: grab;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.2), inset 0 -5px 20px rgba(0, 0, 0, 0.1);
            border: 3px solid rgba(255, 255, 255, 0.3);
            user-select: none;
        }

        .task-bubble::before {
            content: '';
            position: absolute;
            top: 10%;
            left: 15%;
            width: 30%;
            height: 20%;
            background: radial-gradient(ellipse, rgba(255, 255, 255, 0.6) 0%, transparent 70%);
            border-radius: 50%;
            filter: blur(2px);
        }

        .task-bubble::after {
            content: '';
            position: absolute;
            bottom: 15%;
            right: 20%;
            width: 20%;
            height: 15%;
            background: radial-gradient(ellipse, rgba(255, 255, 255, 0.3) 0%, transparent 70%);
            border-radius: 50%;
            filter: blur(3px);
        }

        .task-bubble:hover {
            transform: scale(1.15);
            z-index: 100;
            box-shadow: 0 15px 50px rgba(0, 0, 0, 0.3), inset 0 -5px 20px rgba(0, 0, 0, 0.15);
        }

        .task-bubble.dragging {
            cursor: grabbing;
            z-index: 200;
            transform: scale(1.2);
        }

        .task-bubble .bubble-content {
            text-align: center;
            padding: 8px;
            color: white;
            font-weight: 600;
            text-shadow: 0 2px 4px rgba(0, 0, 0, 0.4);
            z-index: 1;
            pointer-events: none;
        }

        .task-bubble .bubble-content .title {
            font-size: 0.8rem;
            margin-bottom: 4px;
            line-height: 1.2;
            max-width: 100%;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .task-bubble .bubble-content .priority {
            font-size: 0.65rem;
            opacity: 0.95;
        }

        .bubble-legend {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-top: 12px;
            flex-wrap: wrap;
        }

        .legend-item {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 5px 10px;
            background: var(--bg-secondary);
            border-radius: 12px;
            font-size: 0.75rem;
            color: var(--text-secondary);
        }

        .legend-color {
            width: 14px;
            height: 14px;
            border-radius: 50%;
            border: 2px solid rgba(255, 255, 255, 0.5);
        }

        .task-panel {
            background: var(--card-bg);
            border-radius: 20px;
            padding: 20px;
            box-shadow: 0 10px 40px var(--shadow);
            border: 1px solid var(--border);
            height: fit-content;
        }

        .panel-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 18px;
            padding-bottom: 10px;
            border-bottom: 2px solid var(--border);
        }

        .panel-header h2 {
            font-size: 1.2rem;
            color: var(--text-primary);
            font-weight: 600;
            letter-spacing: 1px;
        }

        .add-task-btn {
            background: var(--header-gradient);
            border: none;
            color: white;
            padding: 8px 16px;
            border-radius: 15px;
            cursor: pointer;
            font-size: 0.8rem;
            font-weight: 600;
            transition: all 0.3s ease;
            box-shadow: 0 5px 20px var(--shadow);
        }

        .add-task-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px var(--shadow);
        }

        .task-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
            max-height: 400px;
            overflow-y: auto;
            padding-right: 5px;
        }

        .task-list::-webkit-scrollbar {
            width: 4px;
        }

        .task-list::-webkit-scrollbar-track {
            background: var(--bg-secondary);
            border-radius: 6px;
        }

        .task-list::-webkit-scrollbar-thumb {
            background: var(--accent);
            border-radius: 6px;
        }

        /* ========== 滑动菜单样式 ========== */
        .task-item-wrapper {
            position: relative;
            border-radius: 14px;
            overflow: hidden;
            background: var(--card-bg);
            border: 1px solid var(--border);
        }

        /* 底层操作按钮区域 */
        .task-item-actions-bg {
            position: absolute;
            top: 0;
            right: 0;
            width: 140px;
            height: 100%;
            display: flex;
            z-index: 1;
        }

        .action-bg-btn {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 1.3rem;
            cursor: pointer;
            border: none;
            outline: none;
            transition: all 0.2s ease;
        }

        .action-bg-btn:hover {
            filter: brightness(1.1);
        }

        .action-bg-btn.complete {
            background: linear-gradient(135deg, var(--complete-color) 0%, #38f9d7 100%);
        }

        .action-bg-btn.delete {
            background: linear-gradient(135deg, var(--delete-color) 0%, #ff6b6b 100%);
        }

        /* 上层任务内容 */
        .task-item {
            position: relative;
            padding: 15px 15px 15px 15px;
            background: var(--card-bg);
            border-radius: 14px;
            transition: transform 0.3s ease, background 0.3s ease, border-color 0.3s ease, box-shadow 0.3s ease;
            z-index: 2;
            cursor: pointer;
        }

        /* 鼠标悬停时向左滑动 */
        .task-item-wrapper:hover .task-item {
            transform: translateX(-140px);
            background: var(--bg-secondary);
            border-color: var(--accent);
            box-shadow: 0 5px 20px var(--shadow);
        }

        .task-item::before {
            content: '';
            position: absolute;
            left: 0;
            top: 0;
            height: 100%;
            width: 4px;
            background: var(--bubble-urgent);
        }

        .task-item.priority-high::before { background: var(--bubble-high); }
        .task-item.priority-medium::before { background: var(--bubble-medium); }
        .task-item.priority-low::before { background: var(--bubble-low); }

        .task-item-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 8px;
        }

        .task-item-title {
            font-size: 0.9rem;
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 4px;
            letter-spacing: 0.5px;
        }

        .task-item-meta {
            display: flex;
            gap: 8px;
            font-size: 0.7rem;
            color: var(--text-secondary);
            flex-wrap: wrap;
        }

        .task-item-description {
            color: var(--text-secondary);
            line-height: 1.5;
            margin-bottom: 10px;
            font-size: 0.8rem;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .task-item-actions {
            display: flex;
            gap: 5px;
            flex-wrap: wrap;
        }

        .action-btn {
            padding: 5px 10px;
            border: 1px solid var(--border);
            background: var(--bg-secondary);
            color: var(--text-primary);
            border-radius: 10px;
            cursor: pointer;
            font-size: 0.7rem;
            font-weight: 600;
            transition: all 0.3s ease;
        }

        .action-btn:hover {
            background: var(--accent);
            color: white;
            border-color: var(--accent);
            transform: translateY(-2px);
        }

        .action-btn.suggest {
            background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
            color: white;
            border-color: transparent;
        }

        .ai-suggestions {
            background: var(--card-bg);
            border-radius: 20px;
            padding: 20px;
            box-shadow: 0 10px 40px var(--shadow);
            border: 1px solid var(--border);
        }

        .ai-header {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 18px;
            padding-bottom: 10px;
            border-bottom: 2px solid var(--border);
        }

        .ai-icon {
            width: 38px;
            height: 38px;
            background: var(--header-gradient);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
            box-shadow: 0 5px 20px var(--shadow);
        }

        .ai-header h2 {
            font-size: 1.2rem;
            color: var(--text-primary);
            font-weight: 600;
            letter-spacing: 1px;
        }

        .suggestion-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 15px;
        }

        .suggestion-card {
            background: var(--card-bg);
            border-radius: 16px;
            padding: 18px;
            border: 1px solid var(--border);
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        .suggestion-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 10px 30px var(--shadow);
            border-color: var(--accent);
        }

        .suggestion-card::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 3px;
            background: var(--bubble-medium);
        }

        .suggestion-card.urgent::after { background: var(--bubble-urgent); }
        .suggestion-card.high::after { background: var(--bubble-high); }
        .suggestion-card.llm::after { background: linear-gradient(90deg, #D4A574, #e94560); }

        .suggestion-title {
            font-size: 0.95rem;
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 6px;
            letter-spacing: 0.5px;
        }

        .suggestion-content {
            color: var(--text-secondary);
            line-height: 1.7;
            margin-bottom: 15px;
            font-size: 0.85rem;
            flex: 1;
            background: var(--bg-secondary);
            padding: 12px;
            border-radius: 10px;
            border: 1px dashed var(--border);
        }

        .suggestion-options {
            display: flex;
            flex-wrap: wrap;
            gap: 5px;
            margin-top: auto;
        }

        .option-btn {
            padding: 5px 10px;
            border: 1px solid var(--border);
            background: var(--bg-secondary);
            color: var(--text-primary);
            border-radius: 12px;
            cursor: pointer;
            font-size: 0.7rem;
            font-weight: 600;
            transition: all 0.3s ease;
        }

        .option-btn:hover {
            background: var(--accent);
            color: white;
            border-color: var(--accent);
        }

        .option-btn.selected {
            background: var(--header-gradient);
            color: white;
            border-color: transparent;
        }

        .ai-deep-analysis {
            background: var(--card-bg);
            border-radius: 20px;
            padding: 20px;
            box-shadow: 0 10px 40px var(--shadow);
            border: 1px solid var(--border);
            margin-bottom: 25px;
        }

        .analysis-tabs {
            display: flex;
            gap: 8px;
            margin-bottom: 18px;
            flex-wrap: wrap;
        }

        .analysis-tab {
            padding: 8px 15px;
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 12px;
            cursor: pointer;
            font-size: 0.8rem;
            font-weight: 600;
            color: var(--text-primary);
            transition: all 0.3s ease;
        }

        .analysis-tab:hover {
            background: var(--bg-tertiary);

        .analysis-item {

            padding: 12px 0;

        .analysis-item:last-child {
            border-bottom: none;

        .analysis-icon {
            width: 36px;
            height: 36px;
            background: var(--bg-secondary);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.1rem;
            flex-shrink: 0;
        }

        .analysis-text {
            flex: 1;
        }

        .analysis-title {
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 5px;
            font-size: 0.9rem;

        .analysis-desc {
            color: var(--text-secondary);
            font-size: 0.8rem;

        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(8px);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }

        .modal-overlay.active {
            display: flex;
        }

        .modal {
            background: var(--card-bg);
            border-radius: 18px;
            padding: 24px;
            width: 90%;
            max-width: 380px;
            border: 1px solid var(--border);
            position: relative;
            animation: modalSlide 0.35s ease;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.4);
        }

        @keyframes modalSlide {
            from { opacity: 0; transform: translateY(-25px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .modal-close {
            position: absolute;
            top: 10px;
            right: 10px;
            background: var(--bg-secondary);
            border: none;
            color: var(--text-primary);
            font-size: 1.1rem;
            cursor: pointer;
            padding: 5px 8px;
            border-radius: 50%;
            transition: all 0.3s ease;
        }

        .modal-close:hover {
            background: var(--accent);
            color: white;
        }

        .modal h2 {
            font-size: 1.3rem;
            margin-bottom: 18px;
            color: var(--text-primary);
            font-weight: 600;
            text-align: center;
            letter-spacing: 1px;
        }

        .form-group {
            margin-bottom: 14px;
        }

        .form-group label {
            display: block;
            margin-bottom: 6px;
            font-weight: 600;
            color: var(--text-primary);
            font-size: 0.8rem;
        }

        .form-group input,
        .form-group select,
        .form-group textarea {
            width: 100%;
            padding: 10px 12px;
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 10px;
            color: var(--text-primary);
            font-size: 0.8rem;
            transition: all 0.3s ease;
            font-family: inherit;
        }

        .form-group input:focus,
        .form-group select:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: var(--accent);
            background: var(--bg-tertiary);
            box-shadow: 0 0 0 3px rgba(212, 165, 116, 0.2);
        }

        .form-group textarea {
            min-height: 60px;
            resize: vertical;
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }

        .submit-btn {
            width: 100%;
            padding: 12px;
            background: var(--header-gradient);
            border: none;
            border-radius: 10px;
            color: white;
            font-size: 0.85rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 5px 20px var(--shadow);
            margin-top: 6px;
        }

        .submit-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px var(--shadow);
        }

        .toast {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: var(--card-bg);
            backdrop-filter: blur(10px);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 12px 18px;
            display: flex;
            align-items: center;
            gap: 10px;
            transform: translateX(400px);
            transition: transform 0.4s ease;
            z-index: 1001;
            box-shadow: 0 10px 40px var(--shadow);
            max-width: 320px;
        }

        .toast.show {
            transform: translateX(0);
        }

        .toast.success { border-left: 4px solid #43e97b; }
        .toast.error { border-left: 4px solid #e94560; }
        .toast.info { border-left: 4px solid #4facfe; }

        .toast-icon { font-size: 1.1rem; }
        .toast-message { color: var(--text-primary); font-size: 0.85rem; }

        @media (max-width: 900px) {
            .main-content { grid-template-columns: 1fr; }
            .stats-panel { grid-template-columns: repeat(2, 1fr); }
        }

        @media (max-width: 600px) {
            .container { padding: 15px 12px; }
            .header h1 { font-size: 1.4rem; }
            .stats-panel { grid-template-columns: 1fr 1fr; }
            .modal { max-width: 95%; padding: 18px; }
            .form-row { grid-template-columns: 1fr; }
            .ai-thinking-bar { flex-direction: column; text-align: center; }
            .ai-actions { width: 100%; justify-content: center; }
            .top-controls { flex-direction: column; align-items: stretch; }
            .control-buttons { justify-content: center; }
            .task-item-wrapper:hover .task-item { transform: translateX(-120px); }
            .task-item-actions-bg { width: 120px; }
        }

        .empty-state {
            text-align: center;
            padding: 35px 20px;
            color: var(--text-secondary);
        }

        .empty-state-icon {
            font-size: 3rem;
            margin-bottom: 12px;
            opacity: 0.5;
        }

        .empty-state-text {
            font-size: 0.9rem;
        }

        body.theme-transition {
            transition: background 0.5s ease, color 0.5s ease;
        }

        body.theme-transition * {
            transition: background-color 0.5s ease, color 0.5s ease, border-color 0.5s ease, box-shadow 0.5s ease;
        }
        
        .llm-loading {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(212, 165, 116, 0.3);
            border-radius: 50%;
            border-top-color: var(--accent);
            animation: spin 1s ease-in-out infinite;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="background-decorations" id="backgroundDecorations"></div>

    <div class="container">
        <div class="top-controls">
            <div class="logo">
                <span class="logo-icon">🎯</span>

                </div>
            </div>
            <div class="ai-actions">
                <button class="ai-action-btn active" id="autoAnalyzeBtn">🔄 自动</button>
                <button class="ai-action-btn" id="manualAnalyzeBtn">💭 深思</button>
                <button class="ai-action-btn" id="quickOptimizeBtn">⚡ 优化</button>
            </div>

        <div class="timeline-indicator">
            <div class="time-segment active" data-time="morning">

            <div class="time-segment" data-time="afternoon">
                <span class="icon">☀️</span>
                <span class="label">午后</span>

            <div class="time-segment" data-time="evening">
                <span class="icon">🌆</span>

                <span class="icon">🌙</span>
                <span class="label">夜晚</span>

        <div class="stats-panel">
            <div class="stat-card">
                <span class="stat-icon">📊</span>
                <div class="stat-value" id="totalTasks">0</div>
                <div class="stat-label">总任务</div>
            </div>
            <div class="stat-card">
                <span class="stat-icon">🔥</span>
                <div class="stat-value" id="urgentTasks">0</div>
                <div class="stat-label">紧急</div>
            </div>
            <div class="stat-card">
                <span class="stat-icon">✅</span>
                <div class="stat-value" id="completedTasks">0</div>
                <div class="stat-label">已完成</div>
            </div>
            <div class="stat-card">
                <span class="stat-icon">⏱️</span>
                <div class="stat-value" id="efficiencyScore">0%</div>
                <div class="stat-label">效率</div>
            </div>
        </div>

        <div class="ai-deep-analysis">
            <div class="analysis-tabs">
                <button class="analysis-tab active" data-tab="overview">📈 概览</button>
                <button class="analysis-tab" data-tab="priority">🎯 优先级</button>
                <button class="analysis-tab" data-tab="time">⏰ 时间</button>
                <button class="analysis-tab" data-tab="suggestion">💡 建议</button>
            </div>
            <div class="analysis-content" id="analysisContent"></div>
        </div>

        <div class="main-content">
            <div class="bubble-visualization">
                <h2 class="section-title">🫧 任务泡泡 (可拖拽)</h2>
                <div class="bubble-container" id="bubbleContainer"></div>
                <div class="bubble-legend">
                    <div class="legend-item">
                        <div class="legend-color" style="background: var(--bubble-urgent);"></div>
                        <span>🔥 紧急</span>
                    </div>
                    <div class="legend-item">
                        <div class="legend-color" style="background: var(--bubble-high);"></div>
                        <span>⚡ 高</span>
                    </div>
                    <div class="legend-item">
                        <div class="legend-color" style="background: var(--bubble-medium);"></div>
                        <span>📌 中</span>
                    </div>
                    <div class="legend-item">
                        <div class="legend-color" style="background: var(--bubble-low);"></div>
                        <span>💤 低</span>

            <div class="task-panel">

        <div class="ai-suggestions">
            <div class="ai-header">
                <div class="ai-icon">🧠</div>
                <h2>LLM 智能建议</h2>
            </div>
            <div class="suggestion-grid" id="suggestionGrid"></div>
        </div>
    </div>

    <div class="modal-overlay" id="modalOverlay">
        <div class="modal">
            <button class="modal-close" id="modalClose">✕</button>
            <h2>✨ 新增任务</h2>
            <form id="taskForm">
                <div class="form-group">
                    <label>任务标题</label>
                    <input type="text" id="taskTitle" placeholder="输入标题" required>
                </div>
                <div class="form-group">
                    <label>描述</label>
                    <textarea id="taskDescription" placeholder="简要描述..."></textarea>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label>优先级</label>
                        <select id="taskPriority" required>
                            <option value="urgent">🔥 紧急</option>
                            <option value="high">⚡ 高</option>
                            <option value="medium">📌 中</option>
                            <option value="low">💤 低</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>耗时 (分钟)</label>
                        <input type="number" id="taskEstimatedTime" placeholder="60" min="1" required>
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label>时段</label>
                        <select id="taskTimeSegment" required>
                            <option value="morning">🌅 早晨</option>
                            <option value="afternoon">☀️ 午后</option>
                            <option value="evening">🌆 傍晚</option>
                            <option value="night">🌙 夜晚</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>截止</label>
                        <input type="date" id="taskDeadline" required>
                    </div>
                </div>
                <button type="submit" class="submit-btn">🚀 创建任务</button>
            </form>
        </div>
    </div>

    <div class="toast" id="toast">
        <span class="toast-icon"></span>
        <span class="toast-message"></span>
    </div>

    <script>
        let tasks = [];
        let taskIdCounter = 0;
        let aiAnalysisMode = 'auto';
        let currentAnalysisTab = 'overview';
        let currentTheme = 'light';
        let bubblePositions = {};
        let bubbleVelocities = {};
        let isDragging = false;
        let draggedBubble = null;
        let dragOffset = { x: 0, y: 0 };
        let autoAnalysisInterval = null;

        document.addEventListener('DOMContentLoaded', function() {
            createBackgroundDecorations();
            loadSampleTasks();
            updateStats();
            renderBubbles();
            renderTaskList();
            generateLLMSuggestions();
            renderAnalysisContent();
            setupEventListeners();
            startAutoAnalysis();
            initBubblePhysics();
        });

        function createBackgroundDecorations() {
            const container = document.getElementById('backgroundDecorations');
            for (let i = 0; i < 15; i++) {
                const particle = document.createElement('div');
                particle.className = 'bg-particle';
                const size = Math.random() * 80 + 30;
                particle.style.width = size + 'px';
                particle.style.height = size + 'px';
                particle.style.left = Math.random() * 100 + '%';
                particle.style.top = Math.random() * 100 + '%';
                particle.style.animationDelay = Math.random() * 20 + 's';
                particle.style.animationDuration = (Math.random() * 15 + 15) + 's';
                particle.style.opacity = Math.random() * 0.3 + 0.15;
                container.appendChild(particle);
            }
        }

        function loadSampleTasks() {
            const sampleTasks = [
                { title: '完成项目报告', description: '撰写季度项目总结报告，包含数据分析', priority: 'urgent', deadline: new Date(Date.now() + 86400000).toISOString().split('T')[0], timeSegment: 'morning', estimatedTime: 120, completed: false },
                { title: '团队会议准备', description: '准备下周团队会议材料和议程', priority: 'high', deadline: new Date(Date.now() + 172800000).toISOString().split('T')[0], timeSegment: 'afternoon', estimatedTime: 60, completed: false },
                { title: '代码审查', description: '审查新提交的功能代码，确保质量', priority: 'medium', deadline: new Date(Date.now() + 259200000).toISOString().split('T')[0], timeSegment: 'afternoon', estimatedTime: 90, completed: false },
                { title: '学习新技术', description: '研究新的前端框架和趋势', priority: 'low', deadline: new Date(Date.now() + 604800000).toISOString().split('T')[0], timeSegment: 'evening', estimatedTime: 180, completed: false },
                { title: '客户反馈处理', description: '处理客户提出的问题和改进建议', priority: 'high', deadline: new Date(Date.now() + 129600000).toISOString().split('T')[0], timeSegment: 'morning', estimatedTime: 45, completed: false }
            ];
            sampleTasks.forEach(task => { 
                task.id = taskIdCounter++; 
                tasks.push(task); 
            });
        }

        function updateStats() {
            document.getElementById('totalTasks').textContent = tasks.length;
            document.getElementById('urgentTasks').textContent = tasks.filter(t => t.priority === 'urgent').length;
            document.getElementById('completedTasks').textContent = tasks.filter(t => t.completed).length;
            const completed = tasks.filter(t => t.completed).length;
            const efficiency = tasks.length > 0 ? Math.round((completed / tasks.length) * 100) : 0;
            document.getElementById('efficiencyScore').textContent = efficiency + '%';
        }

        function initBubblePhysics() {
            const container = document.getElementById('bubbleContainer');
            if (!container) return;
            
            container.addEventListener('mousemove', function(e) {
                if (isDragging) return;
                const rect = container.getBoundingClientRect();
                const mouseX = e.clientX - rect.left;
                const mouseY = e.clientY - rect.top;
                
                Object.keys(bubblePositions).forEach(id => {
                    const bubble = document.querySelector('.task-bubble[data-task-id="' + id + '"]');
                    if (!bubble) return;
                    const bubbleRect = bubble.getBoundingClientRect();
                    const bubbleX = bubbleRect.left - rect.left + bubbleRect.width / 2;
                    const bubbleY = bubbleRect.top - rect.top + bubbleRect.height / 2;
                    const dx = mouseX - bubbleX;
                    const dy = mouseY - bubbleY;
                    const distance = Math.sqrt(dx * dx + dy * dy);
                    if (distance < 150) {
                        const force = (150 - distance) / 150;
                        bubbleVelocities[id].x -= dx * force * 0.02;
                        bubbleVelocities[id].y -= dy * force * 0.02;
                    }
                });
            });

            function updatePhysics() {
                const container = document.getElementById('bubbleContainer');
                if (!container) return;
                const rect = container.getBoundingClientRect();
                const width = rect.width;
                const height = rect.height;
                
                Object.keys(bubblePositions).forEach(id => {
                    if (id === draggedBubble) return;
                    bubblePositions[id].x += bubbleVelocities[id].x;
                    bubblePositions[id].y += bubbleVelocities[id].y;
                    bubbleVelocities[id].x *= 0.95;
                    bubbleVelocities[id].y *= 0.95;
                    
                    const bubble = document.querySelector('.task-bubble[data-task-id="' + id + '"]');
                    if (bubble) {
                        const size = parseInt(bubble.style.width);
                        if (bubblePositions[id].x < size / 2) {
                            bubblePositions[id].x = size / 2;
                            bubbleVelocities[id].x *= -0.5;
                        }
                        if (bubblePositions[id].x > width - size / 2) {
                            bubblePositions[id].x = width - size / 2;
                            bubbleVelocities[id].x *= -0.5;
                        }
                        if (bubblePositions[id].y < size / 2) {
                            bubblePositions[id].y = size / 2;
                            bubbleVelocities[id].y *= -0.5;
                        }
                        if (bubblePositions[id].y > height - size / 2) {
                            bubblePositions[id].y = height - size / 2;
                            bubbleVelocities[id].y *= -0.5;
                        }
                        bubble.style.left = (bubblePositions[id].x - size / 2) + 'px';
                        bubble.style.top = (bubblePositions[id].y - size / 2) + 'px';
                    }
                });
                requestAnimationFrame(updatePhysics);
            }
            updatePhysics();
        }

        function renderBubbles() {
            const container = document.getElementById('bubbleContainer');
            if (!container) return;
            container.innerHTML = '';
            const rect = container.getBoundingClientRect();
            const width = rect.width || 600;
            const height = rect.height || 380;
            
            tasks.forEach((task, index) => {
                const bubble = document.createElement('div');
                bubble.className = 'task-bubble';
                bubble.setAttribute('data-task-id', task.id);
                
                let gradient, size;
                switch(task.priority) {
                    case 'urgent': gradient = 'var(--bubble-urgent)'; size = 130; break;
                    case 'high': gradient = 'var(--bubble-high)'; size = 110; break;
                    case 'medium': gradient = 'var(--bubble-medium)'; size = 90; break;
                    case 'low': gradient = 'var(--bubble-low)'; size = 70; break;
                    default: gradient = 'var(--bubble-medium)'; size = 90;
                }
                
                bubble.style.background = gradient;
                bubble.style.width = size + 'px';
                bubble.style.height = size + 'px';
                
                if (!bubblePositions[task.id]) {
                    const angle = (index / tasks.length) * Math.PI * 2;
                    const radius = Math.min(width, height) / 2 - 100;
                    const centerX = width / 2;
                    const centerY = height / 2;
                    bubblePositions[task.id] = {
                        x: centerX + Math.cos(angle) * radius,
                        y: centerY + Math.sin(angle) * radius
                    };
                    bubbleVelocities[task.id] = { x: 0, y: 0 };
                }
                
                bubble.style.left = (bubblePositions[task.id].x - size / 2) + 'px';
                bubble.style.top = (bubblePositions[task.id].y - size / 2) + 'px';
                
                bubble.innerHTML = '<div class="bubble-content"><div class="title">' + task.title.substring(0, 8) + (task.title.length > 8 ? '...' : '') + '</div><div class="priority">' + getPriorityShortLabel(task.priority) + '</div></div>';
                
                bubble.addEventListener('mousedown', handleDragStart);
                bubble.addEventListener('touchstart', handleDragStart, { passive: false });
                
                container.appendChild(bubble);
            });
        }

        function handleDragStart(e) {
            e.preventDefault();
            isDragging = true;
            draggedBubble = this.getAttribute('data-task-id');
            this.classList.add('dragging');
            
            const container = document.getElementById('bubbleContainer');
            const rect = container.getBoundingClientRect();
            const bubbleRect = this.getBoundingClientRect();
            const clientX = e.touches ? e.touches[0].clientX : e.clientX;
            const clientY = e.touches ? e.touches[0].clientY : e.clientY;
            
            dragOffset = {
                x: clientX - bubbleRect.left - rect.left,
                y: clientY - bubbleRect.top - rect.top
            };
            bubbleVelocities[draggedBubble] = { x: 0, y: 0 };
        }

        function setupEventListeners() {
            document.addEventListener('mousemove', function(e) {
                if (!isDragging || !draggedBubble) return;
                const container = document.getElementById('bubbleContainer');
                if (!container) return;
                const rect = container.getBoundingClientRect();
                const bubble = document.querySelector('.task-bubble[data-task-id="' + draggedBubble + '"]');
                if (!bubble) return;
                const size = parseInt(bubble.style.width);
                const x = e.clientX - rect.left - dragOffset.x + size / 2;
                const y = e.clientY - rect.top - dragOffset.y + size / 2;
                const prevX = bubblePositions[draggedBubble].x;
                const prevY = bubblePositions[draggedBubble].y;
                bubbleVelocities[draggedBubble] = { x: (x - prevX) * 0.5, y: (y - prevY) * 0.5 };
                bubblePositions[draggedBubble] = { x: x, y: y };
                bubble.style.left = (x - size / 2) + 'px';
                bubble.style.top = (y - size / 2) + 'px';
            });

            document.addEventListener('touchmove', function(e) {
                if (!isDragging || !draggedBubble) return;
                e.preventDefault();
                const container = document.getElementById('bubbleContainer');
                if (!container) return;
                const rect = container.getBoundingClientRect();
                const bubble = document.querySelector('.task-bubble[data-task-id="' + draggedBubble + '"]');
                if (!bubble) return;
                const touch = e.touches[0];
                const size = parseInt(bubble.style.width);
                const x = touch.clientX - rect.left - dragOffset.x + size / 2;
                const y = touch.clientY - rect.top - dragOffset.y + size / 2;
                const prevX = bubblePositions[draggedBubble].x;
                const prevY = bubblePositions[draggedBubble].y;
                bubbleVelocities[draggedBubble] = { x: (x - prevX) * 0.5, y: (y - prevY) * 0.5 };
                bubblePositions[draggedBubble] = { x: x, y: y };
                bubble.style.left = (x - size / 2) + 'px';
                bubble.style.top = (y - size / 2) + 'px';
            });

            document.addEventListener('mouseup', handleDragEnd);
            document.addEventListener('touchend', handleDragEnd);

            function handleDragEnd() {
                if (draggedBubble) {
                    const bubble = document.querySelector('.task-bubble[data-task-id="' + draggedBubble + '"]');
                    if (bubble) bubble.classList.remove('dragging');
                }
                isDragging = false;
                draggedBubble = null;
            }

            document.getElementById('themeToggle').addEventListener('click', function() {
                document.body.classList.add('theme-transition');
                if (currentTheme === 'light') {
                    currentTheme = 'dark';
                    document.documentElement.setAttribute('data-theme', 'dark');
                    this.textContent = '☀️ 日间模式';
                } else {
                    currentTheme = 'light';
                    document.documentElement.removeAttribute('data-theme');
                    this.textContent = '🌙 黑夜模式';
                }
                setTimeout(function() { document.body.classList.remove('theme-transition'); }, 500);
                showToast(currentTheme === 'dark' ? '已切换到黑夜模式 🌙' : '已切换到日间模式 ☀️', 'info');
            });

            document.getElementById('resetLayout').addEventListener('click', function() {
                bubblePositions = {};
                bubbleVelocities = {};
                renderBubbles();
                showToast('布局已重置 🔄', 'success');
            });

            document.getElementById('exportData').addEventListener('click', function() {
                const data = JSON.stringify(tasks, null, 2);
                const blob = new Blob([data], { type: 'application/json' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = 'tasks.json';
                a.click();
                URL.revokeObjectURL(url);
                showToast('数据已导出 📤', 'success');
            });

            document.getElementById('addTaskBtn').addEventListener('click', function() {
                document.getElementById('modalOverlay').classList.add('active');
            });

            document.getElementById('modalClose').addEventListener('click', function() {
                document.getElementById('modalOverlay').classList.remove('active');
            });

            document.getElementById('modalOverlay').addEventListener('click', function(e) {
                if (e.target === this) this.classList.remove('active');
            });

            document.getElementById('taskForm').addEventListener('submit', function(e) {
                e.preventDefault();
                const newTask = {
                    id: taskIdCounter++,
                    title: document.getElementById('taskTitle').value,
                    description: document.getElementById('taskDescription').value,
                    priority: document.getElementById('taskPriority').value,
                    deadline: document.getElementById('taskDeadline').value,
                    timeSegment: document.getElementById('taskTimeSegment').value,
                    estimatedTime: parseInt(document.getElementById('taskEstimatedTime').value),
                    completed: false
                };
                tasks.push(newTask);
                updateStats();
                renderBubbles();
                renderTaskList();
                generateLLMSuggestions();
                renderAnalysisContent();
                document.getElementById('modalOverlay').classList.remove('active');
                this.reset();
                showToast('任务创建成功！🎉', 'success');
            });

            document.querySelectorAll('.time-segment').forEach(function(segment) {
                segment.addEventListener('click', function() {
                    document.querySelectorAll('.time-segment').forEach(function(s) { s.classList.remove('active'); });
                    this.classList.add('active');
                    filterBubblesByTime(this.getAttribute('data-time'));
                });
            });

            // 任务列表点击事件 - 支持滑动菜单按钮点击
            document.getElementById('taskList').addEventListener('click', function(e) {
                // 检查是否点击了滑动菜单按钮
                const completeBtn = e.target.closest('.action-bg-btn.complete');
                const deleteBtn = e.target.closest('.action-bg-btn.delete');
                
                if (completeBtn) {
                    const wrapper = completeBtn.closest('.task-item-wrapper');
                    const taskId = parseInt(wrapper.getAttribute('data-task-id'));
                    completeAndDeleteTask(taskId);
                    return;
                }
                
                if (deleteBtn) {
                    const wrapper = deleteBtn.closest('.task-item-wrapper');
                    const taskId = parseInt(wrapper.getAttribute('data-task-id'));
                    deleteTask(taskId);
                    return;
                }
                
                // 检查是否点击了编辑或建议按钮
                const taskItem = e.target.closest('.task-item');
                if (!taskItem) return;
                const taskId = parseInt(taskItem.closest('.task-item-wrapper').getAttribute('data-task-id'));
                const action = e.target.getAttribute('data-action');
                
                if (action === 'edit') editTask(taskId);
                else if (action === 'suggest') showTaskSuggestions(taskId);
            });

            document.getElementById('suggestionGrid').addEventListener('click', function(e) {
                if (e.target.classList.contains('option-btn')) {
                    document.querySelectorAll('.option-btn').forEach(function(btn) {
                        if (btn.getAttribute('data-suggestion') === e.target.getAttribute('data-suggestion')) {
                            btn.classList.toggle('selected');
                        }
                    });
                    showToast('已选择：' + e.target.textContent, 'success');
                }
            });

            document.getElementById('bubbleContainer').addEventListener('click', function(e) {
                if (isDragging) return;
                const bubble = e.target.closest('.task-bubble');
                if (bubble) {
                    const taskId = parseInt(bubble.getAttribute('data-task-id'));
                    highlightTask(taskId);
                }
            });

            document.querySelectorAll('.analysis-tab').forEach(function(tab) {
                tab.addEventListener('click', function() {
                    document.querySelectorAll('.analysis-tab').forEach(function(t) { t.classList.remove('active'); });
                    this.classList.add('active');
                    currentAnalysisTab = this.getAttribute('data-tab');
                    renderAnalysisContent();
                });
            });

            document.getElementById('autoAnalyzeBtn').addEventListener('click', function() {
                aiAnalysisMode = 'auto';
                document.querySelectorAll('.ai-action-btn').forEach(function(btn) { btn.classList.remove('active'); });
                this.classList.add('active');
                startAutoAnalysis();
                showToast('已开启自动分析 🔄', 'info');
            });

            document.getElementById('manualAnalyzeBtn').addEventListener('click', function() {
                aiAnalysisMode = 'manual';
                document.querySelectorAll('.ai-action-btn').forEach(function(btn) { btn.classList.remove('active'); });
                this.classList.add('active');
                performDeepAnalysis();
            });

            document.getElementById('quickOptimizeBtn').addEventListener('click', function() {
                updateAIStatus('⚡ 一键优化中...', '重新排序任务优先级');
                setTimeout(function() {
                    tasks.sort(function(a, b) {
                        const priorityOrder = { urgent: 0, high: 1, medium: 2, low: 3 };
                        return priorityOrder[a.priority] - priorityOrder[b.priority];
                    });
                    renderBubbles();
                    renderTaskList();
                    updateAIStatus('✅ 优化完成', '任务已按优先级排序');
                    showToast('任务已优化排序！📊', 'success');
                }, 1500);
            });
        }

        function startAutoAnalysis() {
            if (autoAnalysisInterval) clearInterval(autoAnalysisInterval);
            autoAnalysisInterval = setInterval(function() {
                if (aiAnalysisMode === 'auto') performAutoAnalysis();
            }, 30000);
        }

        function performAutoAnalysis() {
            updateAIStatus('🤖 AI 分析中...', '实时优化建议');
            setTimeout(function() {
                generateLLMSuggestions();
                renderAnalysisContent();
                updateAIStatus('✅ 分析完成', '建议已更新');
                const urgentCount = tasks.filter(function(t) { return t.priority === 'urgent' && !t.completed; }).length;
                if (urgentCount > 0) showToast('⚠️ 检测到 ' + urgentCount + ' 个紧急任务，建议优先处理！', 'error');
                const overdueCount = tasks.filter(function(t) { return new Date(t.deadline) < new Date() && !t.completed; }).length;
                if (overdueCount > 0) showToast('🚨 发现 ' + overdueCount + ' 个过期任务，请处理！', 'error');
            }, 2000);
        }

        function performDeepAnalysis() {
            updateAIStatus('💭 AI 深度思考中...', '分析任务模式和优先级');
            setTimeout(function() {
                const analysis = {
                    taskCount: tasks.length,
                    urgentCount: tasks.filter(function(t) { return t.priority === 'urgent' && !t.completed; }).length,
                    avgTime: tasks.length > 0 ? Math.round(tasks.reduce(function(sum, t) { return sum + t.estimatedTime; }, 0) / tasks.length) : 0,
                    completionRate: tasks.length > 0 ? Math.round(tasks.filter(function(t) { return t.completed; }).length / tasks.length * 100) : 0
                };
                let insights = [];
                if (analysis.urgentCount > 2) insights.push('🔥 紧急任务过多，建议重新评估优先级分配');
                if (analysis.avgTime > 90) insights.push('⏱️ 任务平均耗时较长，建议分解大任务');
                if (analysis.completionRate < 30) insights.push('📉 完成率偏低，建议减少同时进行的任务数量');
                if (analysis.completionRate > 70) insights.push('🎉 完成率优秀！保持当前工作节奏');
                updateAIStatus('✅ 深度分析完成', '生成 ' + insights.length + ' 条洞察');
                insights.forEach(function(insight, i) {
                    setTimeout(function() { showToast(insight, i === 0 ? 'error' : 'info'); }, i * 1500);
                });
                generateLLMSuggestions();
                renderAnalysisContent();
            }, 3000);
        }

        function updateAIStatus(text, subtext) {
            const statusText = document.getElementById('aiStatusText');
            const statusSubtext = document.getElementById('aiStatusSubtext');
            if (statusText) statusText.textContent = text;
            if (statusSubtext) statusSubtext.textContent = subtext;
        }

        function renderAnalysisContent() {
            const content = document.getElementById('analysisContent');
            if (!content) return;
            const urgentCount = tasks.filter(function(t) { return t.priority === 'urgent' && !t.completed; }).length;
            const highCount = tasks.filter(function(t) { return t.priority === 'high' && !t.completed; }).length;
            const totalTime = tasks.filter(function(t) { return !t.completed; }).reduce(function(sum, t) { return sum + t.estimatedTime; }, 0);
            const completed = tasks.filter(function(t) { return t.completed; }).length;

            const analysisData = {
                overview: [
                    { icon: '📊', title: '任务总量', desc: '当前共有 ' + tasks.length + ' 个任务，已完成 ' + completed + ' 个，完成率 ' + (tasks.length > 0 ? Math.round(completed/tasks.length*100) : 0) + '%' },
                    { icon: '⏱️', title: '预计总耗时', desc: '未完成的任务预计需要 ' + totalTime + ' 分钟，约 ' + Math.ceil(totalTime/60) + ' 小时' },
                    { icon: '🎯', title: '今日重点', desc: urgentCount > 0 ? '有 ' + urgentCount + ' 个紧急任务需要优先处理' : '今日无紧急任务，可按计划执行' }
                ],
                priority: [
                    { icon: '🔥', title: '紧急任务', desc: urgentCount + ' 个紧急任务 - 建议立即处理，避免延误整体进度' },
                    { icon: '⚡', title: '高优先级', desc: highCount + ' 个高优先任务 - 安排在精力充沛时段完成' },
                    { icon: '📌', title: '中低优先级', desc: (tasks.length - urgentCount - highCount) + ' 个任务 - 可灵活安排或利用碎片时间' }
                ],
                time: [
                    { icon: '🌅', title: '早晨时段', desc: tasks.filter(function(t) { return t.timeSegment === 'morning'; }).length + ' 个任务 - 适合处理需要深度思考的工作' },
                    { icon: '☀️', title: '午后时段', desc: tasks.filter(function(t) { return t.timeSegment === 'afternoon'; }).length + ' 个任务 - 适合会议和协作类工作' },
                    { icon: '🌆', title: '傍晚时段', desc: tasks.filter(function(t) { return t.timeSegment === 'evening'; }).length + ' 个任务 - 适合学习和自我提升' },
                    { icon: '🌙', title: '夜晚时段', desc: tasks.filter(function(t) { return t.timeSegment === 'night'; }).length + ' 个任务 - 适合整理和规划类工作' }
                ],
                suggestion: [
                    { icon: '💡', title: '效率优化', desc: '使用番茄工作法（25 分钟工作 +5 分钟休息）可提高专注力 30%' },
                    { icon: '🔄', title: '任务分解', desc: '将超过 2 小时的任务分解为多个小步骤，每步设定明确目标' },
                    { icon: '🎯', title: '优先级调整', desc: '每天早晨重新评估任务优先级，确保最重要任务优先完成' },
                    { icon: '⚖️', title: '工作平衡', desc: '每完成 2-3 个任务后休息 15 分钟，保持持续高效状态' }
                ]
            };

            const data = analysisData[currentAnalysisTab] || analysisData.overview;
            content.innerHTML = data.map(function(item) {
                return '<div class="analysis-item"><div class="analysis-icon">' + item.icon + '</div><div class="analysis-text"><div class="analysis-title">' + item.title + '</div><div class="analysis-desc">' + item.desc + '</div></div></div>';
            }).join('');
        }

        function generateLLMSuggestions() {
            const container = document.getElementById('suggestionGrid');
            if (!container) return;
            container.innerHTML = '<div style="grid-column: 1/-1; text-align: center; padding: 40px; color: var(--text-secondary);"><div class="llm-loading"></div><p style="margin-top: 15px;">LLM 正在思考并生成个性化建议...</p></div>';

            setTimeout(function() {
                container.innerHTML = '';
                const suggestions = [];
                const urgentTasks = tasks.filter(function(t) { return t.priority === 'urgent' && !t.completed; });
                const overdueTasks = tasks.filter(function(t) { return new Date(t.deadline) < new Date() && !t.completed; });
                
                if (urgentTasks.length > 0) {
                    const taskNames = urgentTasks.map(t => '"' + t.title + '"').join('、');
                    suggestions.push({
                        type: 'urgent', isLLM: true, title: '🚨 紧急任务深度分析',
                        content: '检测到 ' + urgentTasks.length + ' 个紧急任务 (' + taskNames + ')。根据任务描述分析，这些任务可能涉及关键交付物。建议：立即暂停所有低优先级工作，采用"单线程"工作模式，集中火力在 2 小时内攻克最困难的部分。',
                        options: ['立即执行', '分解步骤', '寻求协助', '重新排期']
                    });
                }

                if (overdueTasks.length > 0) {
                    const taskNames = overdueTasks.map(t => '"' + t.title + '"').join('、');
                    suggestions.push({
                        type: 'urgent', isLLM: true, title: '⚠️ 延期风险预警',
                        content: '发现 ' + overdueTasks.length + ' 个任务 (' + taskNames + ') 已超出预定截止日期。LLM 分析认为这可能导致后续任务链式延误。建议：重新评估这些任务的"必须完成"属性，对于非核心任务，建议直接与客户或上级沟通调整截止日期。',
                        options: ['沟通延期', '降低标准', '优先处理', '暂时搁置']
                    });
                }

                if (suggestions.length === 0 && tasks.length > 0) {
                    const totalTime = tasks.filter(function(t) { return !t.completed; }).reduce(function(sum, t) { return sum + t.estimatedTime; }, 0);
                    suggestions.push({
                        type: 'medium', isLLM: true, title: '⏱️ 时间流优化',
                        content: '当前待办任务总耗时约 ' + totalTime + ' 分钟。LLM 观察到您的任务分布较为均匀。建议：尝试"任务批处理"策略，将类似的任务安排在同一个时间段连续完成，减少上下文切换带来的认知损耗。',
                        options: ['批量处理', '减少切换', '设定奖励', '查看日历']
                    });
                }
                
                const completed = tasks.filter(function(t) { return t.completed; }).length;
                const rate = tasks.length > 0 ? completed / tasks.length : 0;
                suggestions.push({
                    type: rate > 0.5 ? 'high' : 'medium', isLLM: true,
                    title: rate > 0.5 ? '🎉 效率洞察' : '💡 成长建议',
                    content: rate > 0.5 
                        ? 'LLM 学习您的历史数据发现，您在本周任务完成率较高。建议：保持这种工作节奏，周末适当进行"数字排毒"，恢复精力。'
                        : 'AI 分析显示完成率有提升空间。通常这是因为任务颗粒度太大。建议：将大任务拆解为 3 个 15 分钟可完成的微任务，降低启动门槛。',
                    options: ['任务拆解', '微习惯', '周回顾', '调整计划']
                });

                suggestions.forEach(function(suggestion, index) {
                    const card = document.createElement('div');
                    card.className = 'suggestion-card ' + (suggestion.type || 'medium') + (suggestion.isLLM ? ' llm' : '');
                    card.innerHTML = '<div class="suggestion-title"><span class="icon">' + (suggestion.title ? suggestion.title.split(' ')[0] : '💡') + '</span><span>' + (suggestion.title ? suggestion.title.substring(3) : '智能建议') + '</span></div><div class="suggestion-content">' + suggestion.content + '</div><div class="suggestion-options">' + suggestion.options.slice(0, 4).map(function(option, i) {
                        return '<button class="option-btn" data-suggestion="' + index + '" data-option="' + i + '">' + option + '</button>';
                    }).join('') + '</div>';
                    container.appendChild(card);
                });
            }, 1500);
        }

        function completeAndDeleteTask(taskId) {
            if (confirm('确定要完成并删除这个任务吗？完成后任务将从列表中移除。')) {
                deleteTask(taskId);
                showToast('任务已完成并归档！🎉', 'success');
            }
        }

        function deleteTask(taskId) {
            tasks = tasks.filter(function(t) { return t.id !== taskId; });
            delete bubblePositions[taskId];
            delete bubbleVelocities[taskId];
            updateStats();
            renderBubbles();
            renderTaskList();
            generateLLMSuggestions();
            renderAnalysisContent();
            showToast('任务已删除 🗑️', 'info');
        }

        function editTask(taskId) {
            const task = tasks.find(function(t) { return t.id === taskId; });
            if (task) {
                document.getElementById('taskTitle').value = task.title;
                document.getElementById('taskDescription').value = task.description;
                document.getElementById('taskPriority').value = task.priority;
                document.getElementById('taskDeadline').value = task.deadline;
                document.getElementById('taskTimeSegment').value = task.timeSegment;
                document.getElementById('taskEstimatedTime').value = task.estimatedTime;
                document.getElementById('modalOverlay').classList.add('active');
                const form = document.getElementById('taskForm');
                const originalSubmit = form.onsubmit;
                form.onsubmit = function(e) {
                    e.preventDefault();
                    task.title = document.getElementById('taskTitle').value;
                    task.description = document.getElementById('taskDescription').value;
                    task.priority = document.getElementById('taskPriority').value;
                    task.deadline = document.getElementById('taskDeadline').value;
                    task.timeSegment = document.getElementById('taskTimeSegment').value;
                    task.estimatedTime = parseInt(document.getElementById('taskEstimatedTime').value);
                    updateStats();
                    renderBubbles();
                    renderTaskList();
                    generateLLMSuggestions();
                    renderAnalysisContent();
                    document.getElementById('modalOverlay').classList.remove('active');
                    form.reset();
                    form.onsubmit = originalSubmit;
                    showToast('任务已更新！✏️', 'success');
                };
            }
        }

        function showTaskSuggestions(taskId) {
            const task = tasks.find(function(t) { return t.id === taskId; });
            if (task) {
                let suggestions = [];
                if (task.priority === 'urgent') suggestions = ['立即处理', '分解步骤', '设置检查点'];
                else if (task.estimatedTime > 120) suggestions = ['分段完成', '多时段处理', '寻求协助'];
                else suggestions = ['空闲时间完成', '批量处理', '设置提醒'];
                showToast('💡 "' + task.title + '"：' + suggestions.join(' · '), 'info');
            }
        }

        function highlightTask(taskId) {
            const taskItem = document.querySelector('.task-item[data-task-id="' + taskId + '"]');
            if (taskItem) {
                taskItem.scrollIntoView({ behavior: 'smooth', block: 'center' });
                taskItem.style.background = 'var(--accent)';
                taskItem.style.color = 'white';
                setTimeout(function() { taskItem.style.background = ''; taskItem.style.color = ''; }, 2000);
            }
        }

        function filterBubblesByTime(timeSegment) {
            document.querySelectorAll('.task-bubble').forEach(function(bubble) {
                const taskId = parseInt(bubble.getAttribute('data-task-id'));
                const task = tasks.find(function(t) { return t.id === taskId; });
                if (task && task.timeSegment === timeSegment) {
                    bubble.style.opacity = '1';
                    bubble.style.transform = 'scale(1)';
                } else {
                    bubble.style.opacity = '0.25';
                    bubble.style.transform = 'scale(0.85)';
                }
            });
        }

        function getPriorityShortLabel(priority) {
            const labels = { 'urgent': '🔥', 'high': '⚡', 'medium': '📌', 'low': '💤' };
            return labels[priority] || '📌';
        }

        // 渲染任务列表 - 带滑动菜单
        function renderTaskList() {
            const container = document.getElementById('taskList');
            if (!container) return;
            container.innerHTML = '';

            if (tasks.length === 0) {
                container.innerHTML = '<div class="empty-state"><div class="empty-state-icon">📭</div><p class="empty-state-text">暂无任务</p></div>';
                return;
            }

            tasks.forEach(function(task) {
                // 创建外层容器
                const wrapper = document.createElement('div');
                wrapper.className = 'task-item-wrapper';
                wrapper.setAttribute('data-task-id', task.id);

                // 创建底层操作按钮
                const actionsBg = document.createElement('div');
                actionsBg.className = 'task-item-actions-bg';
                actionsBg.innerHTML = `
                    <button class="action-bg-btn complete" title="完成任务">✅</button>
                    <button class="action-bg-btn delete" title="删除任务">🗑️</button>
                `;

                // 创建上层任务内容
                const taskItem = document.createElement('div');
                taskItem.className = 'task-item priority-' + task.priority;
                const timeLeft = getTimeLeft(new Date(task.deadline));
                taskItem.innerHTML = `
                    <div class="task-item-header">
                        <div>
                            <div class="task-item-title">${task.title}</div>
                            <div class="task-item-meta">
                                <span>📅 ${task.deadline}</span>
                                <span>⏱️ ${task.estimatedTime}min</span>
                                <span>⏰ ${timeLeft}</span>
                            </div>
                        </div>
                        <div style="font-size: 1.2rem;">${getPriorityIcon(task.priority)}</div>
                    </div>
                    <div class="task-item-description">${task.description}</div>
                    <div class="task-item-actions">
                        <button class="action-btn" data-action="edit">✏️ 编辑</button>
                        <button class="action-btn suggest" data-action="suggest">💡 建议</button>
                    </div>
                `;

                wrapper.appendChild(actionsBg);
                wrapper.appendChild(taskItem);
                container.appendChild(wrapper);
            });
        }

        function getTimeLeft(deadline) {
            const diff = deadline - new Date();
            if (diff <= 0) return '已过期';
            const days = Math.floor(diff / (1000 * 60 * 60 * 24));
            if (days > 0) return days + '天';
            return '今日';
        }

        function getPriorityIcon(priority) {
            const icons = { 'urgent': '🔥', 'high': '⚡', 'medium': '📌', 'low': '💤' };
            return icons[priority] || '📌';
        }

        function showToast(message, type) {
            type = type || 'info';
            const toast = document.getElementById('toast');
            if (!toast) return;
            const icons = { success: '✅', error: '❌', info: 'ℹ️' };
            toast.querySelector('.toast-icon').textContent = icons[type] || 'ℹ️';
            toast.querySelector('.toast-message').textContent = message;
            toast.className = 'toast ' + type + ' show';
            setTimeout(function() { toast.classList.remove('show'); }, 4000);
        }
    </script>
</body>
</html>
